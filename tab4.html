<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Profile</title>


  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="profile-page">

    <h1 class="profile-title">User Profile</h1>

    <img
      id="profileImg"
      class="profile-img"
      src="https://www.cs.umd.edu/class/spring2026/cmsc434/P1_2/SmileyFace.png"
      alt="Profile Image"
    />

    <div class="profile-name">
      <strong>Smiley J. Smile</strong>
    </div>


    <div id="banner" class="banner hidden">
      <div>you clicked me! why!?</div>
      <button id="closeBanner">×</button>
    </div>

  </div>


<div class="bottom-bar">
  <div class="bottom-item">
    <div class="icon">📝</div>
    <div class="label">Text</div>
  </div>

  <div class="bottom-item">
    <div class="icon">↔️</div>
    <div class="label">LR</div>
  </div>

  <div class="bottom-item">
    <div class="icon">🎨</div>
    <div class="label">Colors</div>
  </div>

  <div class="bottom-item active">
    <div class="icon">👤</div>
    <div class="label">Profile</div>
  </div>

  <div class="bottom-item">
    <div class="icon">✅</div>
    <div class="label">Choices</div>
  </div>

  <div class="bottom-item">
    <div class="icon">📋</div>
    <div class="label">ToDo</div>
  </div>
</div>

  <script src="script.js"></script>

</body>
</html>
