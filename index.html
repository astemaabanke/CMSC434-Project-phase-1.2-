<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobile App Template</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="mobile-container">
        
        <!-- ============================================ -->
        <!-- MAIN CONTENT AREA FOR ALL TABS               -->
        <!-- Each div below is for one tab's content      -->
        <!-- ============================================ -->
        <div class="content-area">
            
            <!-- TAB 1: TEXT -->
            <!-- Team Member: Add your content for Text tab here -->
            <div class="tab-content active" id="tab1-content">
                <h2>Text Tab</h2>
                <p>Add your text-related content here.</p>
                <!-- Your code goes below this line -->
                
            </div>

            <!-- TAB 2: LR -->
           
            <div class="tab-content" id="tab2-content">
                <h2>LR Tab</h2>
                <p>Add your LR content here.</p>
                <!-- Your code goes below this line -->
                
            </div>

            <!-- TAB 3: COLORS -->
          
            <div class="tab-content" id="tab3-content">
                <h2>Colors Tab</h2>
                <p>Add your colors content here.</p>
                <!-- Your code goes below this line -->
                
            </div>

            <!-- TAB 4: PROFILE -->
            
            <div class="tab-content" id="tab4-content">
                <h2>Profile Tab</h2>
                <p>Add your profile content here.</p>
                <!-- Your code goes below this line -->
                
            </div>

            <!-- TAB 5: CHOICES -->
          
            <div class="tab-content" id="tab5-content">
                <h2>Choices Tab</h2>
                <p>Add your choices content here.</p>
                <!-- Your code goes below this line -->
                
            </div>

            <!-- TAB 6: TODO -->
         
            <div class="tab-content" id="tab6-content">
                <h2>ToDo Tab</h2>
                <p>Add your todo list content here.</p>
                <!-- Your code goes below this line -->
                
            </div>

        </div>

        <!-- ============================================ -->
        <!-- BOTTOM TAB NAVIGATION BAR                    -->
        <!-- You can add icons later by replacing text    -->
        <!-- ============================================ -->
        <div class="tab-bar">
            <button class="tab-button active" data-tab="tab1">
                <span class="label">Text</span>
            </button>

            <button class="tab-button" data-tab="tab2">
                <span class="label">LR</span>
            </button>

            <button class="tab-button" data-tab="tab3">
                <span class="label">Colors</span>
            </button>

            <button class="tab-button" data-tab="tab4">
                <span class="label">Profile</span>
            </button>

            <button class="tab-button" data-tab="tab5">
                <span class="label">Choices</span>
            </button>

            <button class="tab-button" data-tab="tab6">
                <span class="label">ToDo</span>
            </button>
        </div>

    </div>

    <!-- JavaScript for tab switching functionality -->
    <script src="script.js"></script>
</body>
</html>
